<!DOCTYPE html5>
<html lang="pt-BR">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Currículo Online</title>

    <link rel="stylesheet" href="style.css">

</head>
<body>

    <header><h1>Currículo Online</h1></header>

    <nav id="hud">

        <li><a href="#sobre" title="Sobre">Sobre</a></li>
        <li><a href="#formacao" title="Formação">Formação</a></li>
        <li><a href="#portfolio" title="Portfólio">Portfólio</a></li>
        <li><a href="#contato" title="Contato">Contato</a></li>

        <button id="hudButton" type="button" onclick="hudToggle()">^</button>
        <button id="tema" type="button" onclick="themeToggle()">?</button>

    </nav>

    <div id="box">
        <form id="form" action="" method="">

            <section id="sobre">
                <h1>Sobre mim</h1>
                <table class="info">

                    <tr>

                        <th><label for="data">Data de Nascimento:</label></th>
                        <td><input id="data" type="date" name="data" style="cursor: text;"></td>

                    </tr>

                    <tr>

                        <!--Criação da tabela iterativa do usuário para Hobbies-->

                        <th><label for="hobbies">Hobbies:</label></th>
                        <td class="usuario-lista">
                            <div class="usuraio-div">
                                <input class="sem-envio" type="text" placeholder="Ex: Programar, Ler, Esportes...">
                                <button type="button" title="Adicionar elemento">Adicionar</button>
                            </div>
                            <ul></ul>
                        </td>

                    </tr>

                    <tr>

                        <th><label for="apresentacao">Apresentação:</label></th>
                        <td>
                            <textarea name="apresentacao" rows="5" id="apresentacao" placeholder="Quem é você? Conte um pouco sobre sua trajetória..." required></textarea>
                            <span class="obrigatorio">* Campo obrigatório</span>
                        </td>

                    </tr>

                </table>
            </section>

            <section id="formacao">
                <h1>Formação</h1>
                <table class="info">

                    <tr>

                        <!--Criação da tabela iterativa do usuário para Cursos-->

                        <th><label for="cursos">Cursos:</label></th>
                        <td class="usuario-lista">
                            <div class="usuraio-div">
                                <input class="sem-envio" type="text" placeholder="Ex: Ciência da Computação, Web Designer...">
                                <button type="button" title="Adicionar elemento">Adicionar</button>
                            </div>
                            <ul></ul>
                        </td>

                    </tr>

                    <tr>
                        
                        <!--
                        Criação da tabela iterativa do usuário para Idiomas
                        Inserindo automaticamente o idioma nativo do navegador na lista
                        -->

                        <th><label for="idiomas">Idiomas:</label></th>
                        <td class="usuario-lista">
                            <div class="usuraio-div">
                                <input class="sem-envio" id="idioma" type="text">
                                <button type="button" title="Adicionar elemento">Adicionar</button>
                            </div>
                            <ul></ul>
                        </td>

                    </tr>

                    <tr>

                        <th><label for="educacional">Formação Educacional:</label></th>
                        <td>
                            <select name="educacional" id="educacional">
                                <option value="médio">Ensino Médio</option>
                                <option value="tecnico">Curso Técnico</option>
                                <option value="superior" selected>Ensino Superior</option>
                                <option value="pos-graduado">Pós-Graduação</option>
                                <option value="mestrado">Mestrado / Doutorado</option>
                            </select>
                        </td>

                    </tr>

                </table>
            </section>

            <section id="portfolio">
                <h1>Portifólio</h1>
                <table class="info">

                    <tr>

                        <!--Criação da tabela iterativa do usuário para Trabalhos-->

                        <th><label for="trabalhos">Trabalhos:</label></th>
                        <td class="usuario-lista">
                            <div class="usuraio-div">
                                <input class="sem-envio" type="text" placeholder="Ex: Meu GitHub https://github.com/usuario">
                                <button type="button" title="Adicionar elemento">Adicionar</button>
                            </div>
                            <ul></ul>
                        </td>

                    </tr>

                </table>
            </section>

            <section id="contato">
                <h1>Contato</h1>
                <table class="info">

                    <tr>

                        <!--Campo obrigatório-->

                        <th><label for="nome">Nome:</label></th>
                        <td>
                            <input class="sem-envio" type="text" id="nome" name="nome" placeholder="Seu nome completo" required>
                            <span class="obrigatorio">* Campo obrigatório</span>
                        </td>

                    </tr>

                    <tr>

                        <!--Campo obrigatório-->

                        <th><label for="email">E-mail:</label></th>
                        <td>
                            <input class="sem-envio" type="email" id="email" name="email" placeholder="email@exemplo.com" required>
                            <span class="obrigatorio">* Campo obrigatório</span>
                        </td>

                    </tr>

                    <tr>
                        
                        <!--Campo obrigatório-->

                        <th><label for="tel">Telefone/WhatsApp:</label></th>
                        <td>
                            <input class="sem-envio" type="tel" id="tel" maxlength="11" name="telefone" placeholder="DDD + Número (Apenas números)" required>
                            <span class="obrigatorio">* Campo obrigatório</span>
                        </td>

                    </tr>

                </table>
            </section>

            <button type="submit" id="envio">Enviar</button>

        </form>
    </div>

    <!--SCRIPTS-->

    <!--Valores padrão de inputs-->

    <script>
        
        // Mudando o valor padrão de Data de Nascimento para a data atual
        document.getElementById("data").valueAsDate = new Date();

        // Mudando o valor padrão de Idioma para o idioma do navegador
        document.getElementById("idioma").value = navigator.language;

    </script>

    <!--Botões do site-->

    <script>

        // Botão do light / dark mode

        let claro = false;

        const btnTema = document.getElementById("tema");
        const classList = document.body.classList;

        function themeToggle() {

            claro = !claro;

            classList.toggle("light-mode",claro);
            classList.toggle("dark-mode",!claro);

            btnTema.textContent = claro ? "☾" : "☀︎"

        }

        classList.add("light-mode");
        classList.add("dark-mode");

        // Ativação inicial para habilitar o light mode

        themeToggle();

    </script>

    <script>

        // Botão da hud
        // Redefinindo o topo da navegação para mostrar / ocultar barra de navegação
        var show = true;

        const hud = document.getElementById("hud");
        const btn = document.getElementById("hudButton");

        function hudToggle() {

            show = !show;

            if (show) {

                hud.style.top = "0px";
                btn.innerHTML = "^";

            } else {

                hud.style.top = "-60px";
                btn.innerHTML = "v";

            }

        }

    </script>

    <!--Classes-->

    <script>

        // Classe para previnir envio do formulário pelos input de texto

        for (const input of document.getElementsByClassName("sem-envio"))
        {

            // Evento ao digitar no input de texto
            input.addEventListener("keypress", function(event) {

                // Previnir envio do formulário
                if (event.key == "Enter") {event.preventDefault();}

            });

        }

    </script>

    <script>

        /*

        Classe customizada para o usuário criar sua própria lista

        1. Primeiro elemento como div
        2. Último elemento como ul vazio
        3. Primeiro elemento do div como input (Para o nome do elemento a ser criado)
        4. Primeiro elemento do div como botão (Para criar o elemento)

        */

        for (const td of document.getElementsByClassName("usuario-lista")) {

            // Array para verificação de elementos repitidos
            let elementos = []

            const div = td.firstElementChild;
            const ul = td.lastElementChild;
            const input = div.firstElementChild;
            const btn = div.lastElementChild;

            function adicionar() {

                const texto = input.value;

                // Verificando se o texto é válido
                if (!texto) {
                    alert("Digite um texto antes de adicionar");
                    return;
                }

                // Verificando se o texto já foi adicionado
                for (const elemento of elementos) {

                    if (texto === elemento) {
                        alert("Já existe o elemento '" + texto + "'' na lista");
                        return;
                    }

                }

                // Elemento
                const novoElemento = document.createElement("li");
                novoElemento.innerHTML = texto;

                novoElemento.style.transform = "scale(0.5)";
                novoElemento.style.opacity = 0.5;

                // Aplicar animação no próximo frame
                setTimeout(function() {
                    novoElemento.style.transform = "scale(1)";
                    novoElemento.style.opacity = 1;
                }, 1)

                // Botão de remoção do elemento
                const removeBtn = document.createElement("button");
                removeBtn.type = "button";
                removeBtn.title = "Remover elemento";
                removeBtn.innerHTML = "X";

                elementos.push(texto);

                // Evento ao clickar para remover
                removeBtn.addEventListener("click", function() {

                    const id = elementos.indexOf(texto);
                    elementos.splice(id,1);

                    novoElemento.style.opacity = 0;

                    setTimeout(function() {ul.removeChild(novoElemento);}, 300)

                });

                novoElemento.appendChild(removeBtn);
                ul.appendChild(novoElemento);

                // Limpando valor do input
                input.value = "";
                
            }

            // Adicionar elemento ao pressionar o botão adicionar
            btn.addEventListener("click", adicionar);

            // Adicionar elemento ao pressionar enter
            input.addEventListener("keypress", function(event) {

                if (event.key == "Enter") {adicionar();}

            });

            // Adicionar elemento caso haja um valor padrão
            if (input.value) {adicionar();}

        }

    </script>

    <!--Envio-->

    <script>

        // Padrão de emails
        const emailPrefix = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        // Padrão de telefones
        const telPrefix = /^[0-9]{10,11}$/;

        const form = document.getElementById("form");
        
        //Campos obrigatórios
        const apresentacao = document.getElementById("apresentacao");
        const nome = document.getElementById("nome");
        const email = document.getElementById("email");
        const telefone = document.getElementById("tel");
        const envio = document.getElementById("envio");

        // Verificação de campos obrigatórios vazios ao digitar
        function campoMudou(event) {

            const tr = event.target.parentElement;
            const spanObrigatorio = tr.lastElementChild;

            // Esconder ou mostrar span de acordo com a verificação usando "display"
            spanObrigatorio.style.opacity = event.target.value != "" ? 0 : 1;

        }

        // Eventos de mudança no valor do input
        apresentacao.addEventListener("input", campoMudou);
        nome.addEventListener("input", campoMudou);
        email.addEventListener("input", campoMudou);
        telefone.addEventListener("input", campoMudou);

        // Evento ao enviar o formulário
        form.addEventListener("submit", function(event) {
            
            // Previnindo limpeza do formulário
            event.preventDefault();

            if (!emailPrefix.test(email.value)) {
                alert("Insira um endereço de e-mail válido");
                email.focus();
                return;
            }

            if (!telPrefix.test(telefone.value)) {
                alert("Insira um número de telefone válido");
                telefone.focus();
                return;
            }

            // Ativa o estado de envio
            envio.disabled = true;
            envio.textContent = "Processando Envio...";
            document.body.classList.add("enviando");

            // Simulação de envio após 2 segundos
            setTimeout(function() {

                // Limpeza do formulário
                form.reset();

                document.body.classList.remove("enviando");
                envio.disabled = false;
                envio.textContent = "Enviar";
                
                // Reseta a data e idioma padrão pós envio
                document.getElementById("data").valueAsDate = new Date();
                document.getElementById("idioma").value = navigator.language;

                alert("Mensagem enviada com sucesso!");
                
            }, 2000);

        });

    </script>

</body>
</html>
